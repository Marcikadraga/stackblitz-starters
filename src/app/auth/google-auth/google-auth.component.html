<div class="auth">
    <!-- Always present so ViewChild is never undefined -->
    <div #btn class="google-btn" [class.hidden]="(user$ | async) !== null"></div>
  
    <ng-container *ngIf="user$ | async as user">
      <div class="user">
        <img *ngIf="user.picture" [src]="user.picture" alt="avatar" />
        <span class="name">{{ user.name || user.email }}</span>
        <button class="btn" (click)="signOut()">Logout</button>
      </div>
    </ng-container>
  </div>
