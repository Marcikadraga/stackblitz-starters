<div class="auth">
  <div #btn class="google-btn" [class.hidden]="(user$ | async) !== null"></div>

  <ng-container *ngIf="user$ | async as user; else loggedOut">
    <div class="user">
      <img *ngIf="user.picture" [src]="user.picture" alt="avatar" />
      <span class="name">{{ user.name || user.email }}</span>
      <button class="btn" (click)="logout()">Logout</button>
    </div>
  </ng-container>

  <ng-template #loggedOut>
    <button class="btn" (click)="guest()">Continue as Guest</button>
  </ng-template>
</div>
