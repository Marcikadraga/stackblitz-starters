<div class="card">
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="field">
      <label>Username</label>
      <input formControlName="displayName" />
      <small class="err"
        *ngIf="form.controls.displayName.touched && form.controls.displayName.invalid">
        Username is required (min 2 characters).
      </small>
    </div>

    <div class="field">
      <label>Email</label>
      <input formControlName="email" type="email" />
      <small class="err" *ngIf="form.controls.email.touched && form.controls.email.invalid">
        Enter a valid email.
      </small>
    </div>

    <div class="field">
      <label>Password</label>
      <input formControlName="password" type="password" />
      <small class="err" *ngIf="form.controls.password.touched && form.controls.password.invalid">
        Min 6 characters.
      </small>
    </div>

    <p class="err" *ngIf="errorMsg">{{ errorMsg }}</p>

    <button class="btn primary" [disabled]="loading">
      {{ loading ? 'Registering…' : 'Register' }}
    </button>
  </form>
</div>
