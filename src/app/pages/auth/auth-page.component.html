<div class="card">
    <div class="tabs">
      <button class="tab" [class.active]="mode==='register'" (click)="switchMode('register')">Register</button>
      <button class="tab" [class.active]="mode==='login'" (click)="switchMode('login')">Login</button>
    </div>
  
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div *ngIf="mode==='register'" class="field">
        <label>Display name (optional)</label>
        <input formControlName="displayName" />
      </div>
  
      <div class="field">
        <label>Email</label>
        <input formControlName="email" type="email" />
        <small class="err" *ngIf="form.controls.email.touched && form.controls.email.invalid">
          Enter a valid email.
        </small>
      </div>
  
      <div class="field">
        <label>Password</label>
        <input formControlName="password" type="password" />
        <small class="err" *ngIf="form.controls.password.touched && form.controls.password.invalid">
          Min 6 characters.
        </small>
      </div>
  
      <p class="err" *ngIf="errorMsg">{{ errorMsg }}</p>
  
      <button class="btn primary" [disabled]="loading">
        {{ loading ? 'Please wait…' : (mode==='register' ? 'Create account' : 'Login') }}
      </button>
    </form>
  
    <div class="divider"></div>
  
    <button class="btn" type="button" (click)="guest()">Continue as Guest</button>
  </div>
