<h2>Games ({{ gamesCount() }})</h2>

<div class="grid">
  <app-game-card
    *ngFor="let game of games()"
    (clickOnGame)="openGame(game.name)"
  >
    <h3 card-header>{{ game.name }}</h3>

    <p card-body>{{ game.description }}</p>

    <small card-footer>
      By {{ game.creator }} • {{ game.created_at | date: 'mediumDate' }}
    </small>
  </app-game-card>
</div>
