<div class="card">
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="field">
      <label>Email</label>
      <input type="email" formControlName="email" autocomplete="email" />

      <p class="err" *ngIf="form.controls.email.touched && form.controls.email.errors?.['required']">
        Email is required.
      </p>
      <p class="err" *ngIf="form.controls.email.touched && form.controls.email.errors?.['email']">
        Please enter a valid email.
      </p>
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" formControlName="password" autocomplete="current-password" />

      <p class="err" *ngIf="form.controls.password.touched && form.controls.password.errors?.['required']">
        Password is required.
      </p>
    </div>

    <p class="err" *ngIf="errorMsg">{{ errorMsg }}</p>

    <button type="submit" class="btn primary" [disabled]="loading">
      {{ loading ? 'Signing in…' : 'Sign in' }}
    </button>
  </form>
</div>
