<header class="header">
  <div id="logo-container">
    <canvas #logoCanvas></canvas>
  </div>

  <div id="header-link-container">
    <ul class="header-nav">
      <li>
        <a class="header-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          Home
        </a>
      </li>

      <li>
        <a class="header-link" routerLink="/games" routerLinkActive="active">
          Games
        </a>
      </li>

      <li>
        <a class="header-link" routerLink="/settings" routerLinkActive="active">
          Settings
        </a>
      </li>
      
      <li>
        <a class="header-link" routerLink="/about-me" routerLinkActive="active">
          About me
        </a>
      </li>

      <li>
        <a class="header-link" routerLink="/admin" routerLinkActive="active">
          Admin
        </a>
      </li>

      <li class="toggle-li">
        <label class="switch">
          <input type="checkbox" [checked]="theme.darkMode" (change)="onThemeChange($event)" />
          <span class="slider"></span>
        </label>
      </li>
    </ul>
  </div>




  <div id="auth-container">
    <app-header-auth></app-header-auth>
  </div>
</header>
