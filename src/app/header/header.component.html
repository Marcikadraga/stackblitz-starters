<header class="header">
  <div id="logo-container">
    <canvas #logoCanvas></canvas>
  </div>

  <div id="header-link-container">
    <ul class="header-nav">
      <li>
        <a
          class="header-link"
          routerLink="/"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          Home
        </a>
      </li>

      <li>
        <a
          class="header-link"
          routerLink="/games"
          routerLinkActive="active"
        >
          Games
        </a>
      </li>

      <li>
        <a
          class="header-link"
          routerLink="/settings"
          routerLinkActive="active"
        >
          Settings
        </a>
      </li>

      <li>
        <a
          class="header-link"
          routerLink="/about-me"
          routerLinkActive="active"
        >
          About me
        </a>
      </li>
    </ul>
  </div>

  <div id="auth-container">
    <app-header-auth></app-header-auth>
  </div>
</header>
